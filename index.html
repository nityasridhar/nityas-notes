<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nitya's Notes</title>
  <link rel="alternate" type="application/rss+xml" title="Nitya's Notes" href="https://nityasnotes.com/feed.xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    @font-face { font-family: 'Spectral'; src: url('fonts/Spectral-ExtraLight.ttf'); font-weight: 200; }
    @font-face { font-family: 'Spectral'; src: url('fonts/Spectral-Light.ttf'); font-weight: 300; }
    @font-face { font-family: 'Spectral'; src: url('fonts/Spectral-Regular.ttf'); font-weight: 400; }
    @font-face { font-family: 'Spectral'; src: url('fonts/Spectral-Medium.ttf'); font-weight: 500; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #f0ede6;
      height: 100%;
      overflow: hidden;
      width: 100%;
    }

    body {
      background: #f0ede6;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: 'Spectral', Georgia, serif;
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
    }

    #tile-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, 100px);
      grid-template-rows: repeat(auto-fill, 100px);
      gap: 0;
      opacity: 0.35;
    }

    #wall-text {
      position: fixed;
      inset: 0;
      z-index: 1;
      --wall-clear-x: min(58vw, 760px);
      --wall-clear-y: min(48vh, 560px);
      overflow: hidden;
      pointer-events: none;
      padding: 18px 0;
      opacity: 0.34;
      color: rgba(87, 78, 66, 0.35);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.16;
      letter-spacing: 0.08em;
      word-spacing: 0.12em;
      text-transform: uppercase;
      text-align: left;
      text-shadow:
        1px 1px 0 rgba(255, 255, 255, 0.34),
        -1px -1px 0 rgba(77, 68, 58, 0.13);
      mix-blend-mode: multiply;
      -webkit-mask-image: radial-gradient(
        ellipse var(--wall-clear-x) var(--wall-clear-y) at 50% 50%,
        transparent 0 88%,
        rgba(0, 0, 0, 0.12) 96%,
        #000 100%
      );
      mask-image: radial-gradient(
        ellipse var(--wall-clear-x) var(--wall-clear-y) at 50% 50%,
        transparent 0 88%,
        rgba(0, 0, 0, 0.12) 96%,
        #000 100%
      );
    }

    .wall-text-line {
      display: inline;
    }

    .wall-text-line::after {
      content: " / ";
    }

    .tile {
      width: 100px;
      height: 100px;
      border: 1px solid #e0dbd4;
      background: #f0ede8;
      position: relative;
    }

    .tile-social {
      background: #eef2f7;
      color: #1e3a6e;
      font-family: 'Spectral', Georgia, serif;
      font-weight: 400;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
      border: 2px solid #a8bdd8;
      background-image:
        radial-gradient(ellipse at 30% 20%, rgba(30,58,110,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(30,58,110,0.04) 0%, transparent 50%);
      text-shadow: 1px 1px 0 rgba(30,58,110,0.15);
      letter-spacing: 2px;
    }

    .tile-social:hover {
      opacity: 0.7;
    }

    .tile-social.small-text {
      font-size: 14px;
      letter-spacing: 1px;
    }

    #scene {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      overflow: hidden;
      perspective: 1100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #globe {
      position: relative;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
    }

    .card {
      position: absolute;
      backface-visibility: hidden;
      border-radius: 3px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      opacity: 0.72;
      transform-origin: center center;
      will-change: transform, opacity;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 3px;
      display: block;
    }

    #title-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
    }

    #title-overlay a {
      pointer-events: auto;
      text-decoration: none;
      color: #6b7280;
      font-size: 64px;
      font-weight: 300;
      letter-spacing: -0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-shadow: 0 0 30px rgba(240,237,230,1), 0 0 60px rgba(240,237,230,1), 0 0 90px rgba(240,237,230,1), 0 0 120px rgba(240,237,230,0.9);
    }

    #title-overlay a:hover {
      opacity: 0.5;
    }

    @media (max-width: 600px) {
      #title-overlay a { font-size: 34px; }

      #wall-text {
        --wall-clear-x: 78vw;
        --wall-clear-y: 44vh;
        padding: 12px 0;
        opacity: 0.3;
        font-size: 8px;
        line-height: 1.12;
        letter-spacing: 0.06em;
        word-spacing: 0.08em;
      }
    }

    #title-overlay .subtitle {
      pointer-events: none;
      font-size: 13px;
      color: #9ca3af;
      margin-top: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(250,250,250,1);
    }

    .fade-out {
      animation: fadeOut 0.6s ease forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="tile-bg"></div>
  <div id="wall-text" aria-hidden="true"></div>

  <div id="title-overlay">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:500px; height:120px; background:radial-gradient(ellipse, rgba(240,237,230,1) 30%, rgba(240,237,230,0) 70%); z-index:-1;"></div>
    <a href="/home" id="enter-link">nitya's notes</a>
  </div>

  <div id="scene">
    <div id="globe"></div>
  </div>

  <script src="/Books.js?v=landing-globe-covers-reader-caption-sphere-guides-v2-wall-text-live-calendar-ok-kanmani-cover"></script>
  <script>
    const wallText = document.getElementById('wall-text');
    const FALLBACK_WALL_TEXT_LINES = [
      "genius needs leisure to think, and so do you",
      "of course, this characteristic of the intellectual man implies that he has one more need than the others",
      "the need of reading, observing, studying, meditating, practising",
      "the need, in short, of undisturbed leisure",
      "understanding things take uninterrupted time",
      "it seems clear that it is not possible to think well without leisure",
      "why did attention residuals get so much attention",
      "the residual stream accumulating every layer with unit weight",
      "attention residuals are a novel contribution on the relatively under explored axis of depth",
      "learn the fundamentals",
      "phrases i carry around like talismans",
      "focus on what you want to see more of",
      "favorable conditions never come"
    ];
    let cachedWallTextLines = FALLBACK_WALL_TEXT_LINES;

    function cleanWallText(text) {
      return text
        .replace(/\s+/g, ' ')
        .replace(/\[[^\]]*\]\([^)]*\)/g, '')
        .trim();
    }

    function appendWallTextLine(text) {
      const span = document.createElement('span');
      span.className = 'wall-text-line';
      span.textContent = cleanWallText(text);
      wallText.appendChild(span);
    }

    function dedupeLines(lines) {
      const seen = new Set();
      return lines.filter((line) => {
        const cleaned = cleanWallText(line);
        const key = cleaned.toLowerCase();
        if (!cleaned || cleaned.length < 12 || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function renderWallText(lines) {
      const sourceLines = dedupeLines(lines).length ? dedupeLines(lines) : FALLBACK_WALL_TEXT_LINES;
      wallText.textContent = '';

      const maxLineAttempts = 420;
      for (let index = 0; index < maxLineAttempts; index++) {
        appendWallTextLine(sourceLines[index % sourceLines.length]);
        if (
          wallText.scrollHeight > wallText.clientHeight + 2 ||
          wallText.scrollWidth > wallText.clientWidth + 2
        ) {
          wallText.lastElementChild.remove();
          break;
        }
      }
    }

    function parseWritingDate(dateText) {
      const [month, year] = cleanWallText(dateText).split(' ');
      const monthIndex = [
        'January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'
      ].indexOf(month);
      return monthIndex === -1 ? 0 : new Date(Number(year), monthIndex, 1).getTime();
    }

    async function collectWritingPageLines(entry) {
      const response = await fetch(entry.href);
      if (!response.ok) return [];

      const html = await response.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const selectors = [
        'main article blockquote',
        'main article p',
        'main article li',
        'main h1',
        'main h2',
        'main h3'
      ];

      return selectors
        .flatMap(selector => Array.from(doc.querySelectorAll(selector)))
        .map(element => cleanWallText(element.textContent))
        .filter(text => text.length >= 18)
        .slice(0, 12);
    }

    async function loadRecentWritingWallTextLines() {
      const response = await fetch('/writing/');
      if (!response.ok) return FALLBACK_WALL_TEXT_LINES;

      const html = await response.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const entries = Array.from(doc.querySelectorAll('a.essay-item')).map((link, index) => ({
        index,
        href: link.getAttribute('href') || '',
        date: parseWritingDate(link.querySelector('p')?.textContent || ''),
        title: cleanWallText(link.querySelector('h3')?.textContent || ''),
        subtitle: cleanWallText(link.querySelector('p.text-gray-500')?.textContent || '')
      }))
        .filter(entry => entry.title)
        .sort((a, b) => b.date - a.date || a.index - b.index);

      const lines = [];
      for (const entry of entries.slice(0, 6)) {
        lines.push(entry.title);
        if (entry.subtitle) lines.push(entry.subtitle);

        if (entry.href.startsWith('/writing/')) {
          try {
            lines.push(...await collectWritingPageLines(entry));
          } catch (error) {
            // Keep the landing page resilient if a writing page is missing.
          }
        }
      }

      return dedupeLines(lines).length ? lines : FALLBACK_WALL_TEXT_LINES;
    }

    function debounce(callback, wait = 120) {
      let timeoutId;
      return (...args) => {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(() => callback(...args), wait);
      };
    }

    // Generate tile background with social links in top-left tiles
    const tileBg = document.getElementById('tile-bg');
    const cols = Math.ceil(window.innerWidth / 100);
    const rows = Math.ceil(window.innerHeight / 100);
    for (let i = 0; i < cols * rows; i++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tileBg.appendChild(tile);
    }

    // Fallback keeps the landing page alive if Books.js ever fails to load.
    const FALLBACK_IMAGE_PATHS = [
      'images/bugonia.jpg',
      'images/before_sunrise.jpg',
      'images/in_the_mood_for_love.jpg',
      'images/marty_supreme.webp',
      'images/mississippi_masala.jpg',
      'images/attention_residuals.png',
      'images/era_of_experience.png',
      'images/reader.jpg',
      'images/accelerando.jpg',
      'images/bubbles_stagnation.jpg',
      'images/hidden_valley_road.jpg',
      'images/mind_at_play.jpg',
      'images/ogilvy.jpg',
      'images/open_source.jpg',
      'images/psalm_wild_built.jpg',
      'images/weight_of_glory.jpg',
      'images/strategic_wealth.jpg',
      'images/tail_at_scale.png',
      'images/tinkerings_noyce.jpg',
      'images/v2lamp.png',
      'images/o-kadhal-kanmani.jpg',
      'images/project_hail_mary.jpg',
      'images/spirited_away.jpg',
      'images/tenet.jpg'
    ];
    const bookshelfItems = typeof items !== 'undefined' ? items : [];
    const IMAGE_PATHS = bookshelfItems
      .filter((item) => item.cover && Array.isArray(item.category) && item.category.includes('Bookshelf'))
      .map((item) => item.cover.replace(/^\//, ''));

    if (!IMAGE_PATHS.length) {
      IMAGE_PATHS.push(...FALLBACK_IMAGE_PATHS);
    }

    // Scale the globe to the available viewport while keeping the whole sphere legible.
    const viewportMin = Math.min(window.innerWidth, window.innerHeight);
    const isMobile = window.innerWidth < 700;
    const RADIUS = Math.round(Math.max(
      isMobile ? 128 : 250,
      Math.min(
        viewportMin * (isMobile ? 0.38 : 0.48),
        window.innerWidth * (isMobile ? 0.42 : 0.4),
        window.innerHeight * (isMobile ? 0.34 : 0.46),
        isMobile ? 230 : 560
      )
    ));
    const CARD_SIZE = Math.round(Math.max(
      isMobile ? 27 : 32,
      Math.min(isMobile ? 40 : 52, viewportMin * (isMobile ? 0.088 : 0.052))
    ));

    function syncWallTextClearZone() {
      const titleRect = document.getElementById('title-overlay').getBoundingClientRect();
      const horizontalClear = Math.min(
        window.innerWidth * (isMobile ? 0.9 : 0.72),
        Math.max(RADIUS + CARD_SIZE * (isMobile ? 4.2 : 6.6), titleRect.width / 2 + (isMobile ? 110 : 220))
      );
      const verticalClear = Math.min(
        window.innerHeight * (isMobile ? 0.56 : 0.62),
        Math.max(RADIUS + CARD_SIZE * (isMobile ? 3.4 : 4.6), titleRect.height / 2 + RADIUS + CARD_SIZE * (isMobile ? 2.2 : 3.2))
      );

      wallText.style.setProperty('--wall-clear-x', `${Math.round(horizontalClear)}px`);
      wallText.style.setProperty('--wall-clear-y', `${Math.round(verticalClear)}px`);
    }

    syncWallTextClearZone();
    renderWallText(cachedWallTextLines);
    loadRecentWritingWallTextLines().then((lines) => {
      cachedWallTextLines = lines;
      syncWallTextClearZone();
      renderWallText(cachedWallTextLines);
    });
    window.addEventListener('resize', debounce(() => {
      syncWallTextClearZone();
      renderWallText(cachedWallTextLines);
    }));

    function cycleImagePaths(paths, targetCount) {
      return Array.from({ length: targetCount }, (_, index) => paths[index % paths.length]);
    }

    const DISPLAY_IMAGE_PATHS = cycleImagePaths(IMAGE_PATHS, isMobile ? 28 : 52);
    const N = DISPLAY_IMAGE_PATHS.length;

    const globe = document.getElementById('globe');

    function buildSpherePoints(total) {
      const goldenAngle = Math.PI * (3 - Math.sqrt(5));
      const titleBandGap = isMobile ? 0.28 : 0.24;
      return Array.from({ length: total }, (_, index) => {
        const z = 1 - ((index + 0.5) / total) * 2;
        const projectedRadius = Math.sqrt(Math.max(0, 1 - z * z));
        const theta = index * goldenAngle;
        const x = Math.cos(theta) * projectedRadius;
        const rawY = Math.sin(theta) * projectedRadius;
        const yDirection = rawY < 0 ? -1 : 1;
        const y = Math.abs(rawY) < titleBandGap
          ? yDirection * (titleBandGap + Math.abs(rawY) * 0.38)
          : rawY;
        return {
          x,
          y,
          z
        };
      });
    }

    // Create image cards on the sphere
    const spherePoints = buildSpherePoints(N);
    DISPLAY_IMAGE_PATHS.forEach((path, i) => {
      const point = spherePoints[i];
      const x = point.x * RADIUS;
      const y = point.y * RADIUS;
      const z = point.z * RADIUS;
      const yaw = Math.atan2(point.x, point.z) * 180 / Math.PI;
      const pitch = -Math.asin(Math.max(-1, Math.min(1, point.y))) * 180 / Math.PI;
      const card = document.createElement('div');
      card.className = 'card';
      if (path.includes('v2lamp')) {
        card.style.boxShadow = 'none';
        card.style.background = 'transparent';
      }
      card.style.width = CARD_SIZE + 'px';
      card.style.height = (CARD_SIZE * 1.4) + 'px';
      card.style.transform = `
        translate3d(${x - CARD_SIZE / 2}px, ${y - CARD_SIZE * 0.7}px, ${z}px)
        rotateY(${yaw}deg)
        rotateX(${pitch}deg)
      `;
      const img = document.createElement('img');
      img.src = path;
      img.alt = '';
      img.loading = 'eager';
      card.appendChild(img);
      globe.appendChild(card);
    });

    // Rotation state
    let rotX = 0;
    let rotY = 0;
    let velX = 0;
    let velY = 0;
    let isDragging = false;
    let lastX = 0, lastY = 0;
    let autoRotate = true;

    function updateTransform() {
      globe.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    }

    // Drag handlers
    function getPointer(e) {
      if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    function onDown(e) {
      isDragging = true;
      autoRotate = false;
      const p = getPointer(e);
      lastX = p.x;
      lastY = p.y;
      velX = 0;
      velY = 0;
    }

    function onMove(e) {
      if (!isDragging) return;
      const p = getPointer(e);
      const dx = p.x - lastX;
      const dy = p.y - lastY;
      velY = dx * 0.3;
      velX = -dy * 0.3;
      rotY += velY;
      rotX += velX;
      rotX = Math.max(-60, Math.min(60, rotX));
      lastX = p.x;
      lastY = p.y;
      updateTransform();
    }

    function onUp() {
      isDragging = false;
    }

    document.addEventListener('mousedown', onDown);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchstart', onDown, { passive: true });
    document.addEventListener('touchmove', onMove, { passive: true });
    document.addEventListener('touchend', onUp);

    // Animation loop: inertia + auto-rotate
    function animate() {
      if (!isDragging) {
        rotY += velY;
        rotX += velX;
        rotX = Math.max(-60, Math.min(60, rotX));
        velX *= 0.95;
        velY *= 0.95;

        if (Math.abs(velX) < 0.01 && Math.abs(velY) < 0.01) {
          velX = 0;
          velY = 0;
          autoRotate = true;
        }

        if (autoRotate) {
          rotY += 0.08;
        }

        updateTransform();
      }
      requestAnimationFrame(animate);
    }

    updateTransform();
    animate();

    // Click to enter
    document.getElementById('enter-link').addEventListener('click', (e) => {
      e.preventDefault();
      document.body.classList.add('fade-out');
      setTimeout(() => window.location.href = '/home', 600);
    });

    // When returning via the browser Back button (incl. bfcache restore),
    // clear the fade-out so the globe shows again instead of a blank screen
    window.addEventListener('pageshow', () => {
      document.body.classList.remove('fade-out');
    });
  </script>

  <noscript>
    <p style="text-align:center; margin-top:40vh; font-family:Georgia,serif;">
      <a href="/home">Enter Nitya's Notes</a>
    </p>
  </noscript>

</body>
</html>
