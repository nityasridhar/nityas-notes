<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nitya's Notes</title>
  <link rel="alternate" type="application/rss+xml" title="Nitya's Notes" href="https://nityasnotes.com/feed.xml">
  <link rel="stylesheet" href="/style.css">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script>
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body class="min-h-screen bg-gray-50">
  <script>
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.style.background = '#2a2a2a';
      document.body.style.color = '#e0e0e0';
    }
  </script>

<header class="px-5 sm:px-8 py-6 text-left border-b border-gray-100 dark:border-gray-700 flex flex-col sm:flex-row gap-3 sm:justify-between sm:items-baseline">
    <h1 class="text-2xl sm:text-4xl font-light tracking-tight text-gray-900 dark:text-gray-100">
      Nitya's Notes
    </h1>
  <nav class="flex flex-wrap gap-x-4 gap-y-2 sm:gap-x-6 text-sm tracking-wide">
<a href="/bookshelf" class="text-gray-400 hover:text-gray-900 dark:hover:text-gray-200">BOOKSHELF</a>
<a href="/writing" class="text-gray-400 hover:text-gray-900 dark:hover:text-gray-200">WRITING</a>
<a href="/notes" class="text-gray-900 dark:text-gray-100 font-normal">NOTES</a>
</nav>
</header>
</body>
