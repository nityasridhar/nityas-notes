<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nitya's Notes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    @font-face { font-family: 'Spectral'; src: url('fonts/Spectral-ExtraLight.ttf'); font-weight: 200; }
    @font-face { font-family: 'Spectral'; src: url('fonts/Spectral-Light.ttf'); font-weight: 300; }
    @font-face { font-family: 'Spectral'; src: url('fonts/Spectral-Regular.ttf'); font-weight: 400; }
    @font-face { font-family: 'Spectral'; src: url('fonts/Spectral-Medium.ttf'); font-weight: 500; }

    body {
      font-family: 'Spectral', serif;
    }

    /* 3D Book Styles */
    .book-container {
      perspective: 1000px;
      width: 80px;
    }

    .book {
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
      transform: rotateY(-8deg);
    }

    .book-container:hover .book {
      transform: rotateY(-30deg);
    }

    .book-cover {
      position: relative;
      height: 120px;
      border-radius: 0 3px 3px 0;
      overflow: hidden;
      transform: translateZ(8px);
      box-shadow: 2px 2px 8px rgba(0,0,0,0.15);
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .book-spine {
      position: absolute;
      width: 16px;
      height: 100%;
      left: 0;
      top: 0;
      background: #1a1a1a;
      transform: rotateY(-90deg) translateX(-8px);
      transform-origin: left center;
      border-radius: 3px 0 0 3px;
    }

    .book-back {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      background: #222;
      transform: translateZ(-8px);
      border-radius: 3px 0 0 3px;
    }

    .book-pages {
      position: absolute;
      width: 14px;
      height: 94%;
      right: 0;
      top: 3%;
      background: #f0f0f0;
      transform: rotateY(90deg) translateX(7px);
      transform-origin: right center;
    }

    /* List view item */
    .list-item {
      cursor: pointer;
      padding: 16px 0;
      border-bottom: 1px solid #eee;
    }

    .list-item:hover {
      background: #fafafa;
    }

    .list-item.selected {
      background: #f5f5f5;
    }

    .list-item.selected::before {
      content: ">";
      position: absolute;
      left: -20px;
      color: #f97316;
      font-weight: 400;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

  <header class="px-8 py-6 border-b border-gray-100 dark:border-gray-700 flex justify-between items-baseline">
    <a href="home.html" class="text-4xl font-light tracking-tight text-gray-900 dark:text-gray-100 no-underline">Nitya's Notes</a>
    <nav class="flex gap-6 text-sm tracking-wide">
      <a href="bookshelf4.html" class="text-gray-900 dark:text-gray-100 font-normal">BOOKSHELF</a>
      <a href="writing.html" class="text-gray-400 hover:text-gray-900 dark:hover:text-gray-200">WRITING</a>
    </nav>
  </header>

  <div class="flex flex-col md:flex-row">
    <!-- Left: Categories -->
    <aside class="w-full md:w-44 px-8 py-4 md:p-8 shrink-0">
      <nav id="categories" class="flex flex-row flex-wrap gap-x-4 gap-y-1 md:flex-col md:gap-x-0 md:space-y-2"></nav>
    </aside>

    <!-- Main Content Area -->
    <div id="main-area" class="flex-1 flex flex-col md:flex-row min-w-0">
      <!-- Content will be rendered here based on selected category -->
    </div>
  </div>

  <!-- Popup Modal (only for Bookshelf tab) -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg p-8 max-w-lg mx-4 relative">
      <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl">✕</button>
      
      <div class="flex gap-6">
        <img id="modal-cover" class="w-32 h-auto object-contain rounded shadow" />
        <div class="flex-1">
          <h2 id="modal-title" class="text-xl font-bold mb-1"></h2>
          <p id="modal-author" class="text-gray-500 mb-3"></p>
          <div id="modal-rating" class="text-sm mb-2"></div>
          <p id="modal-date" class="text-sm text-gray-400 mb-4"></p>
        </div>
      </div>
      
      <div id="modal-notes" class="text-gray-700 text-sm leading-relaxed mt-4 mb-6"></div>

      <a id="modal-read-link" href="#" target="_blank" class="text-orange-500 hover:text-orange-600 text-sm block mb-3" style="display:none;">→ Read it</a>

    </div>
  </div>

  <!-- Fullscreen painting modal -->
  <div id="painting-modal" class="fixed inset-0 bg-black bg-opacity-90 hidden items-center justify-center z-50"></div>

  <script src="Books.js"></script>
  <script>
    let darkMode = localStorage.getItem('darkMode') === 'true';

    function toggleDarkMode() {
      darkMode = !darkMode;
      localStorage.setItem('darkMode', darkMode);
      applyDarkMode(darkMode);
    }

    function applyDarkMode(on) {
      document.body.classList.toggle('dark-mode', on);
      document.documentElement.classList.toggle('dark', on);
      if (on) {
        document.body.style.background = '#1a1a1a';
        document.body.style.color = '#e0e0e0';
      } else {
        document.body.style.background = '';
        document.body.style.color = '';
      }
      renderCategories();
      renderMainArea();
    }

    const categories = ["Bookshelf", "Books", "Papers", "Blogs", "Movies"];
    let selectedCategory = categories[0];
    let selectedItemId = null;
    let searchQuery = "";

    // Render any stored date as "Month YYYY" (e.g. "May 2026").
    // Accepts "May 2026", "2026-05[-DD]", or "MM/DD/YYYY"; passes through anything else.
    const MONTHS = ["January","February","March","April","May","June",
                    "July","August","September","October","November","December"];
    function formatDate(d) {
      if (!d) return '';
      let m = d.match(/^(\d{4})-(\d{1,2})(?:-\d{1,2})?$/);
      if (m) return `${MONTHS[+m[2] - 1]} ${m[1]}`;
      m = d.match(/^(\d{1,2})\/\d{1,2}\/(\d{4})$/);
      if (m) return `${MONTHS[+m[1] - 1]} ${m[2]}`;
      return d;
    }

    function renderCategories() {
      const nav = document.getElementById('categories');
      const dm = darkMode;
      nav.innerHTML = categories.map(category => `
        <button
          onclick="selectCategory('${category}')"
          class="block text-lg md:text-xl whitespace-nowrap transition-colors ${
            selectedCategory === category
              ? (dm ? 'text-gray-100 font-normal' : 'text-gray-900 font-normal')
              : (dm ? 'text-gray-400 hover:text-gray-200' : 'text-gray-400 hover:text-gray-600')
          }"
        >
          ${category}
        </button>
      `).join('');
    }

    function selectCategory(category) {
      selectedCategory = category;
      selectedItemId = null;
      searchQuery = "";
      renderCategories();
      renderMainArea();
    }

    function renderMainArea() {
      const mainArea = document.getElementById('main-area');
      
      if (selectedCategory === "Bookshelf") {
        renderGridView(mainArea);
      } else {
        renderListView(mainArea);
      }
    }

    // ==================== GRID VIEW (Bookshelf tab) ====================
    function renderGridView(container) {
      // Show all items in grid
      const allItems = items;
      
      container.innerHTML = `
        <main class="flex-1 min-w-0 p-8">
          <div class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-7 lg:grid-cols-9 xl:grid-cols-11 gap-4">
            ${allItems.map(item => {
              if (item.type === "lamp") {
                return `
                  <div class="lamp-container cursor-pointer" onclick="toggleDarkMode()" title="Toggle dark mode">
                    <img src="${item.cover}" alt="${item.title}" style="width:80px; height:120px; object-fit:contain; filter: drop-shadow(0 4px 12px rgba(255,200,100,${darkMode ? '0.6' : '0.2'})); transition: filter 0.3s;" />
                  </div>
                `;
              }
              if (item.type === "painting") {
                return `
                  <div class="cursor-pointer" onclick="openModal(${item.id})" style="width:80px;">
                    <img src="${item.cover}" alt="${item.title}" style="width:80px; height:120px; object-fit:cover; border-radius:2px; box-shadow: 2px 2px 8px rgba(0,0,0,0.15);" />
                  </div>
                `;
              }
              if (item.type === "blog") {
                return `
                  <div class="cursor-pointer" onclick="window.open('${item.url}', '_blank')" style="width:80px; height:120px; background:#fff; border-radius:2px; box-shadow: 2px 2px 8px rgba(0,0,0,0.15); padding:8px; display:flex; flex-direction:column; justify-content:space-between; overflow:hidden;">
                    <div>
                      <div style="width:20px; height:2px; background:#e85d04; margin-bottom:6px;"></div>
                      <p style="font-size:8px; font-weight:600; color:#1a1a1a; line-height:1.3; margin:0;">${item.title}</p>
                    </div>
                    <p style="font-size:6px; color:#666; margin:0;">${item.author}</p>
                  </div>
                `;
              }
              if (item.category.includes("Books")) {
                return `
                <div class="book-container cursor-pointer" onclick="${item.url ? `window.open('${item.url}', '_blank')` : `openModal(${item.id})`}">
                  <div class="book">
                    <div class="book-back"></div>
                    <div class="book-spine" style="background:${item.spineColor || '#1a1a1a'}"></div>
                    <div class="book-pages"></div>
                    <div class="book-cover">
                      <img src="${item.cover}" alt="${item.title}" />
                    </div>
                  </div>
                </div>
                `;
              }
              return `
              <div class="cursor-pointer" onclick="${item.url ? `window.open('${item.url}', '_blank')` : `openModal(${item.id})`}" style="width:80px;">
                <img src="${item.cover}" alt="${item.title}" style="width:80px; height:120px; object-fit:cover; border-radius:2px; box-shadow: 2px 2px 8px rgba(0,0,0,0.15);" />
              </div>
            `;
            }).join('')}
          </div>
        </main>
      `;
    }

    // ==================== LIST VIEW (Books, Papers, etc.) ====================
    function renderListView(container) {
      // Filter items by category
      let filtered = items.filter(item => item.category.includes(selectedCategory));
      
      // Apply search filter
      if (searchQuery) {
        const query = searchQuery.toLowerCase();
        filtered = filtered.filter(item => 
          item.title.toLowerCase().includes(query) || 
          item.author.toLowerCase().includes(query)
        );
      }
      
      const dm = darkMode;
      container.innerHTML = `
        <!-- List -->
        <main class="flex-1 min-w-0 w-full p-8 border-b md:border-b-0 md:border-r ${dm ? 'border-gray-600' : 'border-gray-200'} md:max-w-xl">
          <!-- Search bar -->
          <div class="mb-6">
            <input
              type="text"
              placeholder="Search..."
              value="${searchQuery}"
              onkeyup="handleSearch(event)"
              class="w-full px-4 py-2 border ${dm ? 'border-gray-600 bg-gray-700 text-gray-100 placeholder-gray-400' : 'border-gray-200 bg-white text-gray-900'} rounded-lg focus:outline-none"
            />
          </div>

          <!-- List of items -->
          <div class="space-y-0">
            ${filtered.map(item => `
              <div
                class="list-item relative ${selectedItemId === item.id ? 'selected' : ''}"
                onclick="selectItem(${item.id})"
                style="${dm ? 'border-color: #444;' : ''}"
              >
                <div class="flex justify-between items-baseline gap-4">
                  <div class="min-w-0">
                    <h3 class="font-normal ${dm ? 'text-gray-100' : 'text-gray-900'}">${item.title}</h3>
                    <p class="${dm ? 'text-gray-400' : 'text-gray-500'} text-sm">${item.author}</p>
                  </div>
                  ${item.dateRead ? `<span class="shrink-0 text-sm ${dm ? 'text-gray-500' : 'text-gray-400'}">${formatDate(item.dateRead)}</span>` : ''}
                </div>
              </div>
            `).join('')}
            ${filtered.length === 0 ? '<p class="text-gray-400 italic">No items found</p>' : ''}
          </div>
        </main>

        <!-- Side Panel -->
        <aside class="w-full md:w-96 p-8 ${dm ? 'bg-gray-800' : 'bg-white'} shrink-0 md:min-h-screen">
          <div id="panel-content">
            ${selectedItemId ? renderPanelContent() : '<p class="text-gray-400 italic">Click an item to see notes</p>'}
          </div>
        </aside>
      `;
    }

    function renderPanelContent() {
      const item = items.find(i => i.id === selectedItemId);
      if (!item) return '';
      const dm = darkMode;

      const notesHtml = item.notes
        ? item.notes.split('\n\n').map(p => `<p class="mb-4">${p}</p>`).join('')
        : '';

      return `
        <button onclick="closePanel()" class="${dm ? 'text-gray-400 hover:text-gray-200' : 'text-gray-400 hover:text-gray-600'} text-xl float-right">✕</button>
        <h2 class="text-2xl font-serif font-bold mb-1 pr-8 ${dm ? 'text-gray-100' : ''}">${item.title}</h2>
        <p class="${dm ? 'text-gray-400' : 'text-gray-500'} mb-6">${item.author}</p>
        <p class="text-sm text-gray-400 mb-4">${formatDate(item.dateRead)}</p>
        <div class="${dm ? 'text-gray-300' : 'text-gray-700'} leading-relaxed">${notesHtml}</div>
      `;
    }

    function handleSearch(event) {
      searchQuery = event.target.value;
      renderMainArea();
    }

    function selectItem(id) {
      selectedItemId = id;
      renderMainArea();
    }

    function closePanel() {
      selectedItemId = null;
      renderMainArea();
    }

    // ==================== MODAL (for Bookshelf tab) ====================
    function openModal(id) {
      const item = items.find(item => item.id === id);
      if (!item) return;

      if (item.type === "painting") {
        openPaintingModal(item);
        return;
      }
      if (item.type === "blog") {
        window.open(item.url, '_blank');
        return;
      }

      document.getElementById('modal-cover').src = item.cover;
      document.getElementById('modal-title').textContent = item.title;
      document.getElementById('modal-author').textContent = item.author;
      document.getElementById('modal-date').textContent = formatDate(item.dateRead);

      const notesHtml = item.notes
        ? item.notes.split('\n\n').map(p => `<p class="mb-3">${p}</p>`).join('')
        : '';
      document.getElementById('modal-notes').innerHTML = notesHtml;

      // Add link to paper/source if available
      const readLink = document.getElementById('modal-read-link');
      if (item.url) {
        readLink.href = item.url;
        readLink.style.display = 'inline';
      } else {
        readLink.style.display = 'none';
      }

      // Set the category link based on item's first category (other than Bookshelf)
      const itemCategory = item.category.find(c => c !== "Bookshelf") || "Books";
      document.getElementById('modal-category-link').textContent = `→ Go to all ${itemCategory.toLowerCase()}`;
      document.getElementById('modal-category-link').dataset.category = itemCategory;

      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function openPaintingModal(item) {
      const paintingModal = document.getElementById('painting-modal');
      paintingModal.innerHTML = `
        <div class="relative w-full h-full flex items-center justify-center" onclick="if(event.target===this)closePaintingModal()">
          <button onclick="closePaintingModal()" class="absolute top-6 right-6 text-white text-3xl hover:text-gray-300 z-10">&#10005;</button>
          <div class="text-center">
            <img src="${item.cover}" alt="${item.title}" style="max-width:90vw; max-height:80vh; object-fit:contain; border-radius:4px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);" />
            <h2 class="text-white text-2xl font-normal mt-4">${item.title}</h2>
            <p class="text-gray-300 text-lg">${item.author}</p>
          </div>
        </div>
      `;
      paintingModal.classList.remove('hidden');
      paintingModal.classList.add('flex');
    }

    function closePaintingModal() {
      const paintingModal = document.getElementById('painting-modal');
      paintingModal.classList.add('hidden');
      paintingModal.classList.remove('flex');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
    }

    function goToCategory(event) {
      event.preventDefault();
      const category = event.target.dataset.category;
      closeModal();
      selectCategory(category);
    }

    // Close modal when clicking outside
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Initialize
    if (darkMode) applyDarkMode(true);
    renderCategories();
    renderMainArea();
  </script>

</body>
</html>
